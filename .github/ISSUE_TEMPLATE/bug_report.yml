name: Bug Report
description: Report a bug or unexpected behaviour
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in the details below so we can reproduce and fix it.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps or code to reproduce the issue.
      placeholder: |
        1. Install package version X
        2. Configure ...
        3. Run tests
        4. See error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: What actually happened. Include error messages, stack traces, or screenshots if applicable.
    validations:
      required: true

  - type: input
    id: package-version
    attributes:
      label: Package version
      placeholder: e.g. 2.0.152-beta
    validations:
      required: true

  - type: dropdown
    id: dotnet-version
    attributes:
      label: .NET version
      options:
        - .NET 8
        - .NET 9
        - .NET 10
    validations:
      required: true

  - type: dropdown
    id: test-framework
    attributes:
      label: Test framework
      options:
        - xUnit v3
        - xUnit v2
        - NUnit 4
        - MSTest
        - TUnit
        - BDDfy
        - LightBDD
        - ReqNRoll
        - Other
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other context — OS, CI provider, relevant configuration, etc.
