name: Release

on:
  push:
    tags: [ 'v*' ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required to create GitHub Releases

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost \
            /usr/share/swift /usr/local/graalvm /usr/local/share/powershell /opt/hostedtoolcache
          sudo apt-get clean
          docker image prune --all --force || true
          df -h /

      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build src projects
        run: |
          for proj in src/*/; do
            dotnet build "$proj" --configuration Release -p:Version=${{ steps.version.outputs.VERSION }}
          done

      - name: Test
        run: dotnet test tests/TestTrackingDiagrams.Tests/TestTrackingDiagrams.Tests.csproj --configuration Release --verbosity normal

      - name: Pack
        run: |
          for proj in src/*/; do
            dotnet pack "$proj" --configuration Release --no-build --output ./nupkgs -p:Version=${{ steps.version.outputs.VERSION }}
          done

      - name: Push to NuGet
        run: dotnet nuget push ./nupkgs/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ./nupkgs/*.nupkg
