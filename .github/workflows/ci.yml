name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Core Tests
            projects: TestTrackingDiagrams.Tests
          - name: Adapter Tests
            projects: >-
              TestTrackingDiagrams.Tests.MSTest
              TestTrackingDiagrams.Tests.xUnit2
              TestTrackingDiagrams.Tests.xUnit3
              TestTrackingDiagrams.Tests.LightBDD.xUnit3
          - name: Extension Tests
            projects: >-
              TestTrackingDiagrams.Tests.CosmosDB
              TestTrackingDiagrams.Tests.EfCore.Relational
              TestTrackingDiagrams.Tests.Redis
              TestTrackingDiagrams.Tests.PlantUml.Ikvm
          - name: Selenium Tests
            projects: TestTrackingDiagrams.Tests.Selenium
          - name: Example.Api xUnit Tests
            projects: >-
              Example.Api/tests/Example.Api.Tests.Component.xUnit2
              Example.Api/tests/Example.Api.Tests.Component.xUnit3
          - name: Example.Api BDD Tests
            projects: >-
              Example.Api/tests/Example.Api.Tests.Component.BDDfy.xUnit3
              Example.Api/tests/Example.Api.Tests.Component.LightBDD.xUnit2
              Example.Api/tests/Example.Api.Tests.Component.LightBDD.xUnit3
          - name: Example.Api ReqNRoll & NUnit Tests
            projects: >-
              Example.Api/tests/Example.Api.Tests.Component.ReqNRoll.xUnit2
              Example.Api/tests/Example.Api.Tests.Component.ReqNRoll.xUnit3
              Example.Api/tests/Example.Api.Tests.Component.NUnit4
          - name: Example.Api Integration Tests
            projects: Example.Api/tests/Example.Api.Tests.Integration
    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Pin SDK
        run: echo '{"sdk":{"version":"10.0.0","rollForward":"latestFeature"}}' > global.json

      - name: Build & Test
        run: |
          for project in ${{ matrix.projects }}; do
            echo "::group::Testing $project"
            dotnet test "$project" --configuration Release --verbosity normal
            echo "::endgroup::"
          done
