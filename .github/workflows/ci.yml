name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Core Tests
            projects: tests/TestTrackingDiagrams.Tests
          - name: Adapter Tests
            projects: >-
              tests/TestTrackingDiagrams.Tests.MSTest
              tests/TestTrackingDiagrams.Tests.xUnit2
              tests/TestTrackingDiagrams.Tests.xUnit3
              tests/TestTrackingDiagrams.Tests.LightBDD.xUnit3
          - name: Extension Tests
            projects: >-
              tests/TestTrackingDiagrams.Tests.CosmosDB
              tests/TestTrackingDiagrams.Tests.EfCore.Relational
              tests/TestTrackingDiagrams.Tests.Redis
          - name: PlantUml IKVM Tests
            projects: tests/TestTrackingDiagrams.Tests.PlantUml.Ikvm
            needs-disk-cleanup: true
          - name: Selenium (Popups & Flows)
            projects: tests/TestTrackingDiagrams.Tests.Selenium
            filter: IflowPopupTests|ComponentFlowPopupTests|WholeTestFlowTests
          - name: Selenium (Filters & URL Hash)
            projects: tests/TestTrackingDiagrams.Tests.Selenium
            filter: UrlHashFilterHighlightTests|FilterPerformanceTests
          - name: Selenium (Toolbar & Scenarios)
            projects: tests/TestTrackingDiagrams.Tests.Selenium
            filter: ReportToolbarTests|ScenarioInteractionTests
          - name: Selenium (Diagrams & Context Menu)
            projects: tests/TestTrackingDiagrams.Tests.Selenium
            filter: DiagramZoomTests|DiagramNoteTests|ContextMenuExtendedTests
          - name: E2E (Popups & Flows)
            projects: tests/TestTrackingDiagrams.Tests.EndToEnd
            filter: IflowPopupTests|ComponentFlowPopupTests|WholeTestFlowTests
            needs-playwright: true
          - name: E2E (Filters & Search)
            projects: tests/TestTrackingDiagrams.Tests.EndToEnd
            filter: UrlHashFilterHighlightTests|FilterPerformanceTests|AdvancedSearchTests|DependencyColoringTests
            needs-playwright: true
          - name: E2E (Toolbar & Scenarios)
            projects: tests/TestTrackingDiagrams.Tests.EndToEnd
            filter: ReportToolbarTests|ScenarioInteractionTests|ParameterizedGroupTests|MobileResponsiveTests|LoadingMessageTests|JumpToFailureTests|FailureClusterLinkTests
            needs-playwright: true
          - name: E2E (Diagrams & Notes)
            projects: tests/TestTrackingDiagrams.Tests.EndToEnd
            filter: DiagramZoomTests|DiagramNoteBasicTests|DiagramNoteLongNoteTests|DiagramNoteSplitTests|DiagramNotePartitionTests|ContextMenuExtendedTests|HeadersDetailsInterferenceTests|NoteButtonIndexTests|NoteButtonsAfterHeaderHideTests|ZoomNoteInteractionTests
            needs-playwright: true
          - name: Example.Api xUnit Tests
            projects: >-
              examples/Example.Api/tests/Example.Api.Tests.Component.xUnit2
              examples/Example.Api/tests/Example.Api.Tests.Component.xUnit3
          - name: Example.Api BDD Tests
            projects: >-
              examples/Example.Api/tests/Example.Api.Tests.Component.BDDfy.xUnit3
              examples/Example.Api/tests/Example.Api.Tests.Component.LightBDD.xUnit2
              examples/Example.Api/tests/Example.Api.Tests.Component.LightBDD.xUnit3
          - name: Example.Api ReqNRoll.xUnit2 Tests
            projects: examples/Example.Api/tests/Example.Api.Tests.Component.ReqNRoll.xUnit2
          - name: Example.Api ReqNRoll.xUnit3 Tests
            projects: examples/Example.Api/tests/Example.Api.Tests.Component.ReqNRoll.xUnit3
          - name: Example.Api NUnit4 Tests
            projects: examples/Example.Api/tests/Example.Api.Tests.Component.NUnit4
          - name: Integration (xUnit2)
            projects: examples/Example.Api/tests/Example.Api.Tests.Integration
            restore-first: examples/Example.Api/Example.Api.sln
            filter: Component.xUnit2
          - name: Integration (xUnit3)
            projects: examples/Example.Api/tests/Example.Api.Tests.Integration
            restore-first: examples/Example.Api/Example.Api.sln
            filter: Component.xUnit3
          - name: Integration (NUnit4)
            projects: examples/Example.Api/tests/Example.Api.Tests.Integration
            restore-first: examples/Example.Api/Example.Api.sln
            filter: Component.NUnit4
          - name: Integration (LightBDD)
            projects: examples/Example.Api/tests/Example.Api.Tests.Integration
            restore-first: examples/Example.Api/Example.Api.sln
            filter: Component.LightBDD
          - name: Integration (BDDfy)
            projects: examples/Example.Api/tests/Example.Api.Tests.Integration
            restore-first: examples/Example.Api/Example.Api.sln
            filter: Component.BDDfy
          - name: Integration (ReqNRoll.xUnit2)
            projects: examples/Example.Api/tests/Example.Api.Tests.Integration
            restore-first: examples/Example.Api/Example.Api.sln
            filter: Component.ReqNRoll.xUnit2
          - name: Integration (ReqNRoll.xUnit3)
            projects: examples/Example.Api/tests/Example.Api.Tests.Integration
            restore-first: examples/Example.Api/Example.Api.sln
            filter: Component.ReqNRoll.xUnit3
    steps:
      - name: Free disk space (IKVM)
        if: matrix.needs-disk-cleanup
        run: |
          sudo rm -rf /usr/local/lib/android /opt/ghc /usr/share/swift || true
          sudo rm -rf /usr/share/dotnet/shared/Microsoft.NETCore.App/6.* || true
          sudo rm -rf /usr/share/dotnet/shared/Microsoft.NETCore.App/7.* || true
          sudo rm -rf /usr/share/dotnet/shared/Microsoft.AspNetCore.App/6.* || true
          sudo rm -rf /usr/share/dotnet/shared/Microsoft.AspNetCore.App/7.* || true
          df -h /

      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        if: matrix.restore-first
        run: dotnet restore ${{ matrix.restore-first }}

      - name: Install Playwright browsers
        if: matrix.needs-playwright
        run: |
          dotnet build ${{ matrix.projects }} --configuration Release
          pwsh ${{ matrix.projects }}/bin/Release/net10.0/playwright.ps1 install chromium --with-deps

      - name: Build & Test
        run: |
          FILTER_ARG=""
          if [ -n "${{ matrix.filter }}" ]; then
            # Build filter: split by | and create FullyQualifiedName~ OR chain
            IFS='|' read -ra PARTS <<< "${{ matrix.filter }}"
            CLAUSES=()
            for part in "${PARTS[@]}"; do
              CLAUSES+=("FullyQualifiedName~$part")
            done
            JOINED=$(IFS='|'; echo "${CLAUSES[*]}")
            FILTER_ARG="--filter \"$JOINED\""
          fi
          for project in ${{ matrix.projects }}; do
            echo "::group::Testing $project"
            dotnet test "$project" --configuration Release --verbosity normal $FILTER_ARG
            echo "::endgroup::"
          done
