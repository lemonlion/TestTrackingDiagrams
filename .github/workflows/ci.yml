name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost
          sudo apt-get clean

      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Pin SDK
        run: echo '{"sdk":{"version":"10.0.0","rollForward":"latestFeature"}}' > global.json

      - name: Build
        run: dotnet build TestTrackingDiagrams.sln --configuration Release

      - name: Build Example.Api
        run: dotnet build Example.Api/Example.Api.sln --configuration Release

  test:
    name: Test (${{ matrix.name }})
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: core
            projects: TestTrackingDiagrams.Tests
          - name: adapters
            projects: >-
              TestTrackingDiagrams.Tests.MSTest
              TestTrackingDiagrams.Tests.xUnit2
              TestTrackingDiagrams.Tests.xUnit3
              TestTrackingDiagrams.Tests.LightBDD.xUnit3
          - name: extensions
            projects: >-
              TestTrackingDiagrams.Tests.CosmosDB
              TestTrackingDiagrams.Tests.EfCore.Relational
              TestTrackingDiagrams.Tests.Redis
              TestTrackingDiagrams.Tests.PlantUml.Ikvm
          - name: selenium
            projects: TestTrackingDiagrams.Tests.Selenium
          - name: example-api
            projects: Example.Api/Example.Api.sln
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost
          sudo apt-get clean

      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Pin SDK
        run: echo '{"sdk":{"version":"10.0.0","rollForward":"latestFeature"}}' > global.json

      - name: Test
        run: |
          for project in ${{ matrix.projects }}; do
            echo "::group::Testing $project"
            dotnet test "$project" --configuration Release --verbosity normal
            echo "::endgroup::"
          done
