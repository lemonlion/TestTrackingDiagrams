<!DOCTYPE html>
<html>
<head>
    <title>Debug: iflow link click test</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        #log { background: #1e1e1e; color: #d4d4d4; padding: 16px; border-radius: 4px; font-family: monospace; font-size: 13px; white-space: pre-wrap; min-height: 200px; max-height: 400px; overflow-y: auto; margin-top: 16px; }
        .log-info { color: #9cdcfe; }
        .log-warn { color: #dcdcaa; }
        .log-error { color: #f44747; }
        .log-success { color: #6a9955; }
        h2 { margin-top: 24px; }
    </style>
</head>
<body>
    <h1>iflow link click debug test</h1>
    <p>This page renders a PlantUML sequence diagram with <code>[[#iflow-xxx]]</code> link syntax using the TeaVM BrowserJS engine, then tests whether click handlers work.</p>

    <h2>1. Rendered Diagram</h2>
    <div id="puml-test" class="plantuml-browser" data-plantuml="@startuml
participant A
participant B
A -> B: [[#iflow-test-123 Click me]]
B --> A: [[#iflow-test-123-res Response]]
@enduml" data-diagram-type="plantuml">Loading...</div>

    <h2>2. Debug Log</h2>
    <div id="log"></div>

    <!-- Fake iflow segment data -->
    <script>
        window.__iflowSegments = {
            "iflow-test-123": {
                title: "Test Internal Flow (3 spans)",
                content: "<div style='padding:10px'>This is the popup content for iflow-test-123</div>"
            },
            "iflow-test-123-res": {
                title: "Test Response Flow",
                content: "<div style='padding:10px'>This is the popup content for iflow-test-123-res</div>"
            }
        };
    </script>

    <!-- Debug logger -->
    <script>
        var logDiv = document.getElementById('log');
        function log(msg, cls) {
            var line = document.createElement('div');
            line.className = cls || 'log-info';
            line.textContent = '[' + new Date().toISOString().substr(11,12) + '] ' + msg;
            logDiv.appendChild(line);
            logDiv.scrollTop = logDiv.scrollHeight;
            console.log(msg);
        }
    </script>

    <!-- Load patched PlantUML JS -->
    <script src="https://cdn.jsdelivr.net/gh/lemonlion/plantuml-js-plantuml_limit_size_8192@v1.2026.3beta6-patched/viz-global.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/lemonlion/plantuml-js-plantuml_limit_size_8192@v1.2026.3beta6-patched/plantuml.js"></script>

    <script>
        log('PlantUML JS loaded, calling plantumlLoad()...');
        plantumlLoad();
        log('plantumlLoad() completed.');

        document.addEventListener('DOMContentLoaded', function() {
            log('DOMContentLoaded fired');

            var el = document.getElementById('puml-test');
            var source = el.getAttribute('data-plantuml');
            log('Source PlantUML: ' + source.substring(0, 100) + '...');

            // Render
            var lines = source.split('\n');
            log('Rendering diagram (' + lines.length + ' lines)...');

            var mo = new MutationObserver(function(mutations) {
                mo.disconnect();
                log('MutationObserver fired! ' + mutations.length + ' mutation(s)', 'log-success');

                // Inspect rendered SVG
                var svg = el.querySelector('svg');
                if (svg) {
                    log('SVG found: ' + svg.outerHTML.length + ' chars', 'log-success');
                } else {
                    log('NO SVG FOUND in container!', 'log-error');
                }

                // Find all <a> elements
                var allAnchors = el.querySelectorAll('a');
                log('Total <a> elements found: ' + allAnchors.length);

                // Dump ALL <text> elements (this is what TeaVM actually produces)
                var allText = el.querySelectorAll('text');
                log('Total <text> elements found: ' + allText.length);
                allText.forEach(function(t, i) {
                    var attrs = [];
                    for (var j = 0; j < t.attributes.length; j++) attrs.push(t.attributes[j].name + '=' + JSON.stringify(t.attributes[j].value));
                    log('  <text>[' + i + ']: "' + t.textContent + '"  attrs: ' + attrs.join(', '));
                });

                // Dump raw SVG (first 2000 chars)
                log('--- RAW SVG (first 2000 chars) ---');
                log(el.innerHTML.substring(0, 2000));
                log('--- END SVG ---');

                // Try the NEW text-matching approach
                bindIflowLinks(el, source);
            });
            mo.observe(el, { childList: true, subtree: true });

            try {
                window.plantuml.render(lines, el.id);
                log('plantuml.render() called (async, waiting for MO)');
            } catch(e) {
                log('RENDER ERROR: ' + e.message, 'log-error');
            }
        });

        // NEW: Extract iflow label→segmentId map from PlantUML source
        function extractIflowMap(source) {
            var map = {};
            var re = /\[\[#(iflow-[^\s\]]+)\s+([^\]]+)\]\]/g;
            var m;
            while ((m = re.exec(source)) !== null) {
                var label = m[2].replace(/\\n/g, ' ').replace(/\s+/g, ' ').trim();
                map[label] = m[1]; // label → segmentId (without #)
                log('  Extracted: "' + label + '" → ' + m[1], 'log-info');
            }
            return map;
        }

        // NEW: bindIflowLinks - works with both <a>-based (IKVM) and <text>-based (TeaVM) SVGs
        function bindIflowLinks(container, source) {
            if (!container) { log('bindIflowLinks: container is null!', 'log-error'); return; }

            // Try 1: <a> elements (IKVM/server rendering)
            var bound = 0;
            container.querySelectorAll('a').forEach(function(a) {
                var href = a.getAttribute('xlink:href') || a.getAttribute('href') || '';
                if (href.indexOf('#iflow-') !== 0) return;
                a.style.cursor = 'pointer';
                a.addEventListener('click', function(ev) {
                    log('CLICK (via <a>) on ' + href, 'log-success');
                    ev.preventDefault();
                    ev.stopPropagation();
                    if (window._iflowShowPopup) window._iflowShowPopup(href.substring(1));
                });
                bound++;
            });
            if (bound > 0) {
                log('Bound ' + bound + ' <a>-based iflow links (server rendering)', 'log-success');
                return;
            }

            // Try 2: text-matching (TeaVM/browser rendering)
            log('No <a> elements found — trying text-matching approach', 'log-warn');
            if (!source) { log('No source provided, cannot text-match', 'log-error'); return; }

            var iflowMap = extractIflowMap(source);
            var labels = Object.keys(iflowMap);
            if (labels.length === 0) { log('No iflow links found in source', 'log-warn'); return; }
            log('Found ' + labels.length + ' iflow labels to match', 'log-info');

            container.querySelectorAll('text').forEach(function(textEl) {
                var txt = textEl.textContent.replace(/\s+/g, ' ').trim();
                if (!txt) return;
                for (var i = 0; i < labels.length; i++) {
                    if (txt === labels[i]) {
                        var segId = iflowMap[labels[i]];
                        textEl.style.cursor = 'pointer';
                        textEl.style.pointerEvents = 'all';
                        textEl.addEventListener('click', function(ev) {
                            log('CLICK (via <text> match) on ' + segId, 'log-success');
                            ev.preventDefault();
                            ev.stopPropagation();
                            if (window._iflowShowPopup) window._iflowShowPopup(segId);
                        });
                        log('  MATCHED <text> "' + txt + '" → ' + segId, 'log-success');
                        break;
                    }
                }
            });
        }

        // Capture-phase fallback — updated for <text> elements too
        document.addEventListener('click', function(e) {
            var el = e.target;
            log('CAPTURE click on: ' + el.localName + ' (ns=' + el.namespaceURI + ')', 'log-info');

            // If it's a <text> element, don't walk up looking for <a> —
            // the direct handler on the <text> should have fired.
            // This fallback only matters for <a>-based rendering.
            var depth = 0;
            while (el && el !== document && depth < 20) {
                if (el.localName === 'a') {
                    var href = el.getAttribute('xlink:href') || el.getAttribute('href') || '';
                    log('  Found <a> at depth ' + depth + ': href=' + JSON.stringify(href));
                    if (href.indexOf('#iflow-') === 0) {
                        log('  CAPTURE HANDLER: iflow link matched!', 'log-success');
                        e.preventDefault();
                        e.stopPropagation();
                        showPopup(href.substring(1));
                        return;
                    }
                }
                el = el.parentNode;
                depth++;
            }
            log('  No iflow link found in ancestry (walked ' + depth + ' levels)', 'log-warn');
        }, true);

        // Popup function
        function showPopup(segmentId) {
            log('showPopup called with: ' + segmentId, 'log-success');
            var data = window.__iflowSegments || {};
            var segment = data[segmentId];
            if (segment) {
                log('  Segment found! title=' + segment.title, 'log-success');
                alert('POPUP WOULD SHOW:\n\nTitle: ' + segment.title + '\nContent: ' + (segment.content || '').substring(0, 100));
            } else {
                log('  Segment NOT found in __iflowSegments!', 'log-error');
                log('  Available keys: ' + Object.keys(data).join(', '));
                alert('Segment "' + segmentId + '" not found!');
            }
        }
        window._iflowShowPopup = showPopup;
    </script>
</body>
</html>
