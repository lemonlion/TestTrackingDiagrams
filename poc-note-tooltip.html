<!DOCTYPE html>
<html>
<head>
<title>POC: Note Tooltip — Native SVG title (no trim)</title>
<style>
    body { font-family: -apple-system, 'Segoe UI', sans-serif; padding: 2em; }
    h3 { margin-top: 2em; }
    svg { display: block; margin: 1em 0; }
</style>
</head>
<body>
<h2>POC: Note Tooltip — Native SVG &lt;title&gt; (no trim)</h2>
<p>Hover over each yellow box to see the native browser tooltip.</p>

<h3>1. JSON body with headers (typical case)</h3>
<svg id="note1" width="120" height="40"><rect width="120" height="40" fill="#ffffcc" stroke="#ccc"/><text x="60" y="25" text-anchor="middle" font-size="13">...</text></svg>

<h3>2. Headers only (no body)</h3>
<svg id="note2" width="120" height="40"><rect width="120" height="40" fill="#ffffcc" stroke="#ccc"/><text x="60" y="25" text-anchor="middle" font-size="13">...</text></svg>

<h3>3. Large JSON body (&gt;20 lines, should truncate)</h3>
<svg id="note3" width="120" height="40"><rect width="120" height="40" fill="#ffffcc" stroke="#ccc"/><text x="60" y="25" text-anchor="middle" font-size="13">...</text></svg>

<h3>4. Form-encoded body with headers</h3>
<svg id="note4" width="120" height="40"><rect width="120" height="40" fill="#ffffcc" stroke="#ccc"/><text x="60" y="25" text-anchor="middle" font-size="13">...</text></svg>

<script>
// Simulate contentLines as they'd appear in PlantUML source (between "note left" and "end note")
var notes = {
    note1: [
        '$color(gray)[Content-Type=application/json]',
        '$color(gray)[Authorization=Bearer eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXV...]',
        '$color(gray)[X-Correlation-Id=abc-123-def-456]',
        '',
        '{',
        '  "merchantId": "M12345",',
        '  "amount": 99.99,',
        '  "currency": "GBP",',
        '  "reference": "ORDER-2026-001",',
        '  "metadata": {',
        '    "source": "web",',
        '    "channel": "mobile"',
        '  }',
        '}'
    ],
    note2: [
        '$color(gray)[Content-Type=application/json]',
        '$color(gray)[Authorization=Bearer eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXV...]',
        '$color(gray)[X-Correlation-Id=abc-123-def-456]',
        '$color(gray)[Cache-Control=no-cache]'
    ],
    note3: (function() {
        var lines = [
            '$color(gray)[Content-Type=application/json]',
            '$color(gray)[Authorization=Bearer token123]',
            '',
            '{'
        ];
        for (var i = 1; i <= 30; i++) {
            lines.push('  "field' + i + '": "value' + i + '",');
        }
        lines.push('  "lastField": "done"');
        lines.push('}');
        return lines;
    })(),
    note4: [
        '$color(gray)[Content-Type=application/x-www-form-urlencoded]',
        '$color(gray)[Accept=*/*]',
        '',
        'grant_type=client_credentials',
        '&client_id=my-service',
        '&client_secret=super-secret-value',
        '&scope=api.read api.write'
    ]
};

Object.keys(notes).forEach(function(id) {
    var svg = document.getElementById(id);
    var rect = svg.querySelector('rect');
    var contentLines = notes[id];

    // Same logic as in DiagramContextMenu.cs — no .trim()
    var tipLines = contentLines.map(function(l) {
        return l.replace(/^\s*\$color\(gray\)/, '');
    });
    var tipText = tipLines.join('\n').trim();
    if (tipText) {
        var displayLines = tipText.split('\n');
        if (displayLines.length > 20) {
            tipText = displayLines.slice(0, 20).join('\n') + '\n...';
        }
        // Native SVG <title> — browser manages show/hide automatically
        var titleEl = document.createElementNS('http://www.w3.org/2000/svg', 'title');
        titleEl.textContent = tipText;
        rect.appendChild(titleEl);
    }
});
</script>
</body>
</html>
